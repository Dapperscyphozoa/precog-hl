name: SMC Cutover

on:
  push:
    branches: [smc-v1]
  workflow_dispatch:

concurrency:
  group: smc-cutover
  cancel-in-progress: false

jobs:
  cutover:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: write
    env:
      RENDER_API_TOKEN: ${{ secrets.RENDER_API_TOKEN }}
      PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
      PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
      RENDER_SERVICE_ID: srv-d7ksm7d7vvec739n7f70
      PROD_HOST: precog-i8c3.onrender.com
      SMC_SOURCE_DIR: ${{ github.workspace }}/smc_src
      LIVE_TRADING: "0"
      LONG_ONLY: "1"
      FIXED_NOTIONAL_USD: "50"
      MAX_OPEN_POSITIONS: "20"
      ENTRY_TIF: "Alo"
    steps:
      - name: Checkout smc-v1
        uses: actions/checkout@v4
        with:
          ref: smc-v1
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure git identity
        run: |
          git config user.name  "smc-cutover-bot"
          git config user.email "smc-cutover-bot@users.noreply.github.com"

      - name: Prepare /var/data
        run: |
          sudo mkdir -p /var/data
          sudo chown -R "$(id -u):$(id -g)" /var/data

      - name: Run cutover state machine
        run: bash scripts/cutover.sh

      - name: Upload state on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smc-state
          path: /tmp/smc_state.json
          if-no-files-found: ignore

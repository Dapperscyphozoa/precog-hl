name: Poll bot diagnostics

# Runs every 5 minutes. Hits the live bot's diagnostic endpoints, combines
# the JSON, commits to the diagnostics-data branch. The sandbox where Claude
# runs cannot reach Render, but it CAN read GitHub via MCP — so this
# workflow is the bridge that lets Claude verify deploys without operator
# intervention.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you polling now?'
        required: false
        default: 'manual_check'
  # 2026-04-29: also trigger on every push to main so the snapshot
  # refreshes immediately after each deploy (GH Actions cron has known
  # 5-30+ min lag on first run after workflow file changes).
  push:
    branches: [main]

permissions:
  contents: write

env:
  BOT_BASE: https://precog-i8c3.onrender.com
  SNAPSHOT_BRANCH: diagnostics-data

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout snapshot branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SNAPSHOT_BRANCH }}
          fetch-depth: 1
          persist-credentials: true

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch endpoints + build snapshot
        run: |
          set -e
          set -x
          pwd
          ls -la
          git status
          mkdir -p snapshots
          NOW_UTC=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          NOW_TS=$(date -u +'%s')
          OUT=snapshots/latest.json
          TMP=$(mktemp -d)

          fetch() {
            local name="$1" path="$2"
            local f="${TMP}/${name}.json"
            local code
            code=$(curl -sS -o "$f" -w '%{http_code}' --max-time 20 "${BOT_BASE}${path}" || echo "curl_err")
            if [ "$code" = "200" ]; then
              echo "  \"${name}\": $(cat "$f")"
            else
              echo "  \"${name}\": {\"_err\": \"http_${code}\"}"
            fi
          }

          {
            echo "{"
            echo "  \"polled_at_utc\": \"${NOW_UTC}\","
            echo "  \"polled_ts\": ${NOW_TS},"
            echo "  \"workflow_run_id\": \"${GITHUB_RUN_ID}\","
            echo "  \"trigger\": \"${GITHUB_EVENT_NAME}\","
            fetch diagnose             /diagnose             ; echo ","
            fetch edge_audit_overall   /edge_audit?days=7    ; echo ","
            fetch edge_audit_bb_rej    /edge_audit?engine=BB_REJ&days=14 ; echo ","
            fetch edge_audit_liq_cscd  /edge_audit?engine=LIQ_CSCD&days=14 ; echo ","
            fetch hour_veto_status     /hour_veto_status     ; echo ","
            fetch bad_entry_kill_status /bad_entry_kill_status ; echo ","
            fetch bucket_filter_status /bucket_filter_status ; echo ","
            fetch trades_recent        /trades/recent?hours=12 ; echo ","
            fetch perf_status          /perf_status          ; echo ","
            fetch btcd_status          /btcd_status          ; echo ","
            fetch precog_status        /precog_status        ; echo ","
            fetch confluence_trades    /confluence/trades?hours=12 ; echo ","
            fetch regime_status        /regime
            echo "}"
          } > "$OUT"

          cp "$OUT" "snapshots/${NOW_TS}.json"

          # Trim archive to last 288 (24h at 5-min cadence)
          ls -1t snapshots/[0-9]*.json 2>/dev/null | tail -n +289 | xargs -r rm -f

      - name: Commit + push
        run: |
          set -x
          ls -la snapshots/
          git status
          git add snapshots/
          git diff --cached --stat
          if git diff --cached --quiet; then
            echo "no changes — exiting"
            exit 0
          fi
          git commit -m "diagnostics: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          for i in 1 2 3 4; do
            if git push origin "${SNAPSHOT_BRANCH}"; then
              exit 0
            fi
            sleep $((2**i))
          done
          exit 1
